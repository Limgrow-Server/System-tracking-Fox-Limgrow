name: quality

on:
  pull_request:
  push:
    branches:
      - main
      - staging
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
      - "release/**"
      - "chore/**"
      - "codex/**"

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      OPENROUTER_API_KEY: ci-placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Test
        run: npm run test --if-present

      - name: Build
        run: npm run build

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured. Skipping Discord notification."
            exit 0
          fi

          node <<'NODE' > /tmp/discord-payload.json
          const status = process.env.JOB_STATUS || "unknown";
          const ok = status === "success";
          const emoji = ok ? "✅" : "❌";
          const color = ok ? 5763719 : 15548997;
          const sha = (process.env.SHA || "").slice(0, 7);
          const payload = {
            embeds: [
              {
                title: `${emoji} quality ${status}`,
                color,
                fields: [
                  { name: "Repository", value: process.env.REPOSITORY || "-", inline: true },
                  { name: "Branch", value: process.env.REF_NAME || "-", inline: true },
                  { name: "Actor", value: process.env.ACTOR || "-", inline: true },
                  { name: "Commit", value: sha || "-", inline: true },
                  { name: "Run", value: process.env.RUN_URL || "-", inline: false },
                ],
                timestamp: new Date().toISOString(),
              },
            ],
          };
          process.stdout.write(JSON.stringify(payload));
          NODE

          curl -sS -H "Content-Type: application/json" \
            -X POST \
            --data @/tmp/discord-payload.json \
            "$DISCORD_WEBHOOK_URL"
